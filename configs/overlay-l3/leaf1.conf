! --- VRF for tenant routing ---
vrf instance TENANT-A
   rd 10.0.0.3:1

! --- Add second tenant VLAN ---
vlan 20
   name TENANT-A-L3

! --- SVIs (anycast gateway — same IP and MAC on both leaves) ---
ip virtual-router mac-address 00:1c:73:00:00:01   ! Shared virtual MAC, Arista-style

interface Vlan10
   vrf TENANT-A
   ip address virtual 10.10.10.254/24             ! Anycast gateway for VLAN 10

interface Vlan20
   vrf TENANT-A
   ip address virtual 10.10.20.254/24             ! Anycast gateway for VLAN 20

! --- Add L3 VNI and VLAN 20 to VXLAN interface ---
interface Vxlan1
   vxlan vlan 20 vni 10020                        ! VLAN 20 → VNI 10020
   vxlan vrf TENANT-A vni 99999                   ! L3 VNI for symmetric IRB
   vxlan flood vtep add 10.0.0.4                  ! Add LEAF-2 for VLAN 20 BUM too

! --- Enable IP routing in VRF ---
ip routing vrf TENANT-A

! --- Add VRF and VLAN 20 to BGP ---
router bgp 65001
   vlan 20
      rd 10.0.0.3:10020
      route-target both 65001:10020
      redistribute learned

   vrf TENANT-A
      rd 10.0.0.3:1
      route-target import evpn 65001:99999
      route-target export evpn 65001:99999
      redistribute connected                      ! Advertise SVI subnets as Type 5
