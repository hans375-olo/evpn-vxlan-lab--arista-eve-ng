! --- Create the tenant VLAN ---
vlan 10
   name TENANT-A-L2

! --- VXLAN data plane ---
interface Vxlan1
   vxlan source-interface Loopback0
   vxlan udp-port 4789
   vxlan vlan 10 vni 10010                   ! VLAN 10 maps to VNI 10010
   vxlan flood vtep 10.0.0.4                 ! Ingress replication: send BUM to LEAF-2

! --- Add EVPN address family to existing BGP config ---
router bgp 65001
   ! Activate EVPN on both spine sessions
   neighbor 10.1.1.0 route-map EVPN-OUT out
   neighbor 10.1.2.0 route-map EVPN-OUT out

   address-family evpn
      neighbor 10.1.1.0 activate
      neighbor 10.1.2.0 activate

   ! Advertise VLAN 10 MAC/IP (Type 2 routes) via EVPN
   vlan 10
      rd 10.0.0.3:10010
      route-target both 65001:10010
      redistribute learned

! --- Route map (permit all, required for EVPN peering) ---
route-map EVPN-OUT permit 10

! --- Assign a host-facing port to VLAN 10 ---
interface Ethernet3
   description HOST-A
   switchport mode access
   switchport access vlan 10
   no shutdown
