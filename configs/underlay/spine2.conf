service routing protocols model multi-agent
!
hostname SPINE-2
!
interface Ethernet1
   description to-LEAF-1
   no switchport
   ip address 10.1.2.0/31
   no shutdown
!
interface Ethernet2
   no switchport
   ip address 10.1.2.2/31
   no shutdown
!
interface Loopback0
   ip address 10.0.0.2/32
!
interface Management1
  ip address 192.168.100.12/24
!
ip routing
!
router bgp 65000
   router-id 10.0.0.2
   maximum-paths 2
   neighbor 10.1.2.1 remote-as 65001
   neighbor 10.1.2.1 description LEAF-1
   neighbor 10.1.2.1 send-community extended
   neighbor 10.1.2.1 maximum-routes 12000
   neighbor 10.1.2.3 remote-as 65002
   neighbor 10.1.2.3 description LEAF-2
   neighbor 10.1.2.3 send-community extended
   neighbor 10.1.2.3 maximum-routes 12000
   network 10.0.0.2/32
